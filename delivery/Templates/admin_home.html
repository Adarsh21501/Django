<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            overflow-x: hidden;
        }

        /* 🔥 Animated Background Glow */
        body::before {
            content: "";
            position: fixed;
            width: 300px;
            height: 300px;
            background: #00f2fe;
            filter: blur(150px);
            top: 10%;
            left: 10%;
            animation: move 10s infinite alternate;
        }

        body::after {
            content: "";
            position: fixed;
            width: 300px;
            height: 300px;
            background: #ff00cc;
            filter: blur(150px);
            bottom: 10%;
            right: 10%;
            animation: move 12s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0,0); }
            to { transform: translate(100px, 100px); }
        }

        /* 🔥 Header */
        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
        }

        .welcome {
            font-size: 16px;
            opacity: 0.8;
        }

        /* 🔥 Dashboard Layout */
        .container {
            padding: 40px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* 🔥 Glass Cards */
        .card {
            width: 280px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
            top: 0;
            left: -100%;
            transition: 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .icon {
            font-size: 45px;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 18px;
            margin-bottom: 15px;
        }

        /* 🔥 Buttons */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: 0.3s;
        }

        .add {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
        }

        .show {
            background: linear-gradient(45deg, #ff512f, #dd2476);
        }

        .btn:hover {
            transform: scale(1.1);
        }

        /* 🔥 Footer */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            opacity: 0.6;
        }

    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="title">⚡ AI Admin Dashboard</div>
        <div class="welcome">Welcome Admin 👑</div>
    </div>

    <!-- Cards -->
    <div class="container">

        <div class="card">
            <div class="icon">➕</div>
            <div class="card-title">Add New Restaurant</div>
            <a href="open_add_restaurant" class="btn add">
                Create
            </a>
        </div>

        <div class="card">
            <div class="icon">📊</div>
            <div class="card-title">Manage Restaurants</div>
            <a href="open_show_restaurant" class="btn show">
                View All
            </a>
        </div>

    </div>

    <!-- Footer -->
    <div class="footer">
        🚀 Powered by Your Food App | 2026
    </div>

</body>
</html>
