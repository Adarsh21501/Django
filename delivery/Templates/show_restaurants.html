<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurants</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        /* 🔥 Header */
        .header {
            background: linear-gradient(90deg, #141e30, #243b55);
            color: white;
            padding: 15px 30px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* 🔥 Container */
        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        /* 🔥 Card */
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
        }

        .cuisine {
            color: gray;
            font-size: 14px;
        }

        /* 🔥 Rating Box */
        .rating {
            margin: 8px 0;
            display: inline-block;
            background: #16a34a;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
        }

        /* 🔥 Buttons */
        .btn {
            display: block;
            text-decoration: none;
            text-align: center;
            margin-top: 6px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }

        .update {
            background: linear-gradient(45deg, #3b82f6, #2563eb);
            color: white;
        }

        .delete {
            background: linear-gradient(45deg, #ef4444, #dc2626);
            color: white;
        }

        .menu {
            background: linear-gradient(45deg, #22c55e, #16a34a);
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* 🔥 Empty State */
        .empty {
            text-align: center;
            margin-top: 50px;
            font-size: 18px;
            color: gray;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        🍽 Restaurant Management
    </div>

    <!-- Cards -->
    <div class="container">
        {% for r in restaurantList %}
        <div class="card">

            <img src="{{ r.picture }}" alt="Restaurant">

            <div class="card-body">
                <div class="name">{{ r.name }}</div>
                <div class="cuisine">{{ r.cuisine }}</div>

                <div class="rating">
                    {{ r.rating }} ★
                </div>

                <a href="{% url 'open_update_restaurant' r.id %}" class="btn update">
                    ✏ Update Info
                </a>

                <a href="{% url 'delete_restaurant' r.id %}" class="btn delete">
                    🗑 Delete
                </a>

                <a href="{% url 'open_update_menu' r.id %}" class="btn menu">
                    📋 Manage Menu
                </a>
            </div>

        </div>
        {% empty %}
            <div class="empty">No restaurants found 🍽</div>
        {% endfor %}
    </div>

</body>
</html>
