<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Restaurant</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 🔥 MOVING BACKGROUND */
        .bg-slider {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .bg-slider img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .bg-slider img.active {
            opacity: 1;
        }

        /* 🔥 DARK OVERLAY */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        /* 🔥 FORM CARD */
        .container {
            width: 400px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* INPUTS */
        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #22c55e, #16a34a);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* BACK LINK */
        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #cbd5f5;
            text-decoration: none;
            font-size: 14px;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- 🔥 BACKGROUND IMAGES -->
    <div class="bg-slider">
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" class="active">
        <img src="https://images.unsplash.com/photo-1555992336-03a23c4a6d8c">
        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
        <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
    </div>

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- FORM -->
    <div class="container">
        <h2>🍽 Create Restaurant</h2>

        <form action="{% url 'add_restaurant' %}" method="post">
            {% csrf_token %}

            <div class="input-group">
                <label>Restaurant Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="input-group">
                <label>Image URL</label>
                <input type="text" name="picture" required>
            </div>

            <div class="input-group">
                <label>Cuisine</label>
                <input type="text" name="cuisine" required>
            </div>

            <div class="input-group">
                <label>Rating</label>
                <input type="number" name="rating" min="0" max="5" step="0.5" required>
            </div>

            <button type="submit">🚀 Add Restaurant</button>
        </form>

        <a href="open_show_restaurant" class="back">⬅ Back to Restaurants</a>
    </div>

    <!-- 🔥 SCRIPT -->
    <script>
        let index = 0;
        const images = document.querySelectorAll(".bg-slider img");

        setInterval(() => {
            images[index].classList.remove("active");
            index = (index + 1) % images.length;
            images[index].classList.add("active");
        }, 4000);
    </script>

</body>
</html>
