<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: url("https://images.unsplash.com/photo-1504674900247-0877df9cc836") no-repeat center/cover;
            z-index: -1;
            animation: zoom 20s infinite alternate;
            filter: brightness(0.7);
        }

        @keyframes zoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* 🔥 STICKY HEADER */
        .header {
            background: linear-gradient(90deg, #141e30, #243b55);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;

            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
        }

        .welcome {
            font-size: 16px;
        }

        /* Menu Grid */
        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Card */
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
        }

        .desc {
            color: gray;
            font-size: 14px;
        }

        .price {
            color: #16a34a;
            font-weight: bold;
            margin-top: 5px;
        }

        .veg {
            margin-top: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .veg-yes { color: green; }
        .veg-no { color: red; }

        /* Form */
        .form-container {
            max-width: 500px;
            margin: 40px auto;
            padding: 25px;
            border-radius: 15px;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .form-container h2 {
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.03);
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="title">🍽 Restaurant Menu</div>
        <div class="welcome">
            {{ username }} 👋 Welcome
        </div>
    </div>

    <!-- Menu Items -->
    <div class="container">
        {% for item in itemList %}
        <div class="card">

            <img src="{{ item.picture }}" alt="Food">

            <div class="card-body">
                <div class="name">{{ item.name }}</div>
                <div class="desc">{{ item.description }}</div>
                <div class="price">₹{{ item.price }}</div>

                {% if item.vegeterian %}
                    <div class="veg veg-yes">🌱 Veg</div>
                {% else %}
                    <div class="veg veg-no">🍗 Non-Veg</div>
                {% endif %}
            </div>

        </div>
        {% endfor %}
    </div>

    <!-- Add Menu Form -->
  

    <!-- 🔥 AUTO REFRESH FIX -->
    <script>
        document.getElementById("menuForm").addEventListener("submit", function () {
            setTimeout(() => {
                window.location.reload();
            }, 800);
        });
    </script>

</body>
</html>
