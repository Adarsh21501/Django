<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign In</title>
    {% load static %}

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ================= CARD ================= */
        .container {
            width: 360px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease-in-out;
        }

        h3 {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
        }

        /* ================= INPUT ================= */
        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #fff;
            font-size: 14px;
        }

        /* ================= PASSWORD TOGGLE ================= */
        .toggle {
            position: absolute;
            right: 10px;
            top: 38px;
            font-size: 12px;
            cursor: pointer;
            color: #333;
        }

        /* ================= BUTTON ================= */
        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #ff7e5f, #ff9966);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* ================= LINKS ================= */
        .extra-links {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .extra-links a {
            color: #ffd369;
            text-decoration: none;
            font-weight: 500;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        /* ================= ANIMATION ================= */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media(max-width:480px){
            .container{
                width:90%;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h3>Welcome Back</h3>

    <form action="{% url 'signin' %}" method="post">
        {% csrf_token %}

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="pass" name="password" placeholder="Enter password" required>
            <span class="toggle" onclick="togglePass()">Show</span>
        </div>

        <button type="submit">Sign In</button>

        <!-- 🔥 Extra Links -->
        <div class="extra-links">
            <p><a href="#">Forgot Password?</a></p>
            <p>
                Don't have an account?
                <a href="/open_signup">Create Account</a>
            </p>
        </div>

    </form>
</div>

<script>
    function togglePass() {
        const input = document.getElementById("pass");
        input.type = input.type === "password" ? "text" : "password";
    }
</script>

</body>
</html>
